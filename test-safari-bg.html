<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <title>Absolute Basic Test</title>
    <style>
        /* Absolutnie najbardziej basic ustawienie tła z włączonym domyślnym glass-morphismem Apple */
        html {
            background-color: #000; /* Baza kolorystyczna dla szkła, przydatna gdy obrazek się nie dociąga */
        }

        body {
            /* Wymuszamy podciągnięcie całego body (i jego tła) "pod" obszar kamery/notcha */
            margin: 0;
            padding: 0;
            background-image: url('img/wallpaper.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: scroll; /* Brak fixowania = brak ingerencji w renderowanie Safari */
            
            color: white;
            font-family: -apple-system, sans-serif;
            text-align: center;
            height: 200vh; /* Wymuszenie pustej przestrzeni na scroll */
        }

        .content {
            /* Dajemy margin/padding stricte dla tekstu, żeby nie wjeżdżał pod notcha */
            padding-top: calc(env(safe-area-inset-top) + 20px);
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 4px 8px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="content">
        Back to basics.<br><br>
        Tło ustawione natywnie na tagu <code>body</code>.<br><br>
        👇 Przewiń w dół 👇
    </div>
</body>
</html>
