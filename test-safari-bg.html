<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="color-scheme" content="dark light">
    <title>Safari Translucent + BG Test</title>
    
    <style>
        /* Tlo musi byc ustawione na root zeby darmowe paski dzialaly poprawnie w ciemnym motywie */
        html {
            background-color: #1a1a2e; /* Baza dla dark glass */
            height: 100%;
        }

        /* 
           Metoda "TVN24 / Apple" na tapete krawedz-do-krawedzi: 
           Uzywamy pseudo-elementu. Tlo nie rusza sie przy scrollowaniu 
           i dosiega obszarow enviroment (top/bottom toolbars).
        */
        html::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('img/wallpaper.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        body {
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            min-height: 200vh; /* Wymuszamy scroll zeby przetestowac zachowanie paskow Safari podczas przewijania */
        }

        .header {
            text-align: center;
            padding: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .box-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .box {
            height: 400px;
            border-radius: 24px;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .footer {
            margin-top: 50vh;
            text-align: center;
            padding: 2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header">
        Safari Glass +<br>Wallpaper Test<br>
        <span style="font-size: 1rem; color: #ccc;">Zesccrolluj w dół by wysunąć paski</span>
    </div>

    <div class="box-container">
        <!-- Puste, prześwitujące boksy żeby łatwiej było śledzić scroll względem tapety -->
        <div class="box">Przewiń mnie! 👆</div>
        <div class="box">Przewiń mnie! 👆</div>
    </div>

    <div class="footer">
        Koniec strony
    </div>

</body>
</html>
