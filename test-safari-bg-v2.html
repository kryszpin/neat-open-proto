<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <title>Neat Open Proto Mobile</title>
    <style>
        html {
            background-color: #150E13;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: url('img/wallpaper-clean.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            height: 105vh;
        }

        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to bottom, #150E13 0%, transparent 15%),
                linear-gradient(to top, #150E13 0%, transparent 15%);

            font-family: -apple-system, sans-serif;
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* Pozwalamy klikać przez gradienty */
        }
    </style>
</head>

<body>
    <div class="content">App</div>
</body>

</html>
