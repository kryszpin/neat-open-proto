<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <title>Neat Open Proto Mobile</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        html {
            background-color: #150E13;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: 
                linear-gradient(to bottom, #150E13 0%, transparent 15%),
                linear-gradient(to top, #150E13 0%, transparent 15%),
                url('img/wallpaper-clean.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            height: 105vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* Ukrywanie scrollbara */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }

        /* === TOP BAR (NAV) === */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding-top: var(--safe-top);
            padding-left: calc(var(--safe-left) + 12px);
            padding-right: calc(var(--safe-right) + 12px);
            height: calc(var(--safe-top) + 60px);
            display: flex;
            align-items: center;
            z-index: 100;
        }

        .nav-inner {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .notification-dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background: #007AFF;
            border-radius: 50%;
            border: 2px solid #150E13;
        }

        .nav-title {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-title span {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.7;
        }

        .icon-small {
            width: 12px;
            height: 12px;
            opacity: 0.5;
        }

        svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="nav-inner">
            <!-- Left Button -->
            <div class="nav-btn">
                <svg viewBox="0 0 20 20"><path d="M10 4.5c2 0 3.5 1.5 3.5 3.5s-1.5 3.5-3.5 3.5S6.5 10 6.5 8s1.5-3.5 3.5-3.5zm0 1c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5-1.1-2.5-2.5-2.5zM10 12c2.8 0 5 1.2 5 2.5v.5H5v-.5c0-1.3 2.2-2.5 5-2.5z"/></svg>
                <div class="notification-dot"></div>
            </div>

            <!-- Center Title -->
            <div class="nav-title">
                <span>Brand Design</span>
                <svg class="icon-small" viewBox="0 0 12 8"><path d="M1 2l5 4 5-4" stroke="white" stroke-width="1.5" fill="none"/></svg>
            </div>

            <!-- Right Button -->
            <div class="nav-btn" style="opacity: 0.6;">
                <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" stroke="white" stroke-width="1.5" fill="none"/><path d="M10 7v6M10 10h.01" stroke="white" stroke-width="1.5" fill="none"/></svg>
            </div>
        </div>
    </nav>
</body>

</html>
