<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <title>Neat Open Proto Mobile</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        html {
            background-color: #150E13;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: 
                linear-gradient(to bottom, #150E13 0%, transparent 15%),
                linear-gradient(to top, #150E13 0%, transparent 15%),
                url('img/wallpaper-clean.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            height: 105vh;
            color: white;
            font-family: 'Golos Text', -apple-system, sans-serif;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: none;
        }

        /* Ukrywanie scrollbara */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        *::-webkit-scrollbar {
            display: none;
        }

        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
        }

        /* === NAV === */
        .nav {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            left: 0;
            right: 0;
            top: 0;
            padding-top: var(--safe-top);
            padding-bottom: 12px;
            padding-left: calc(var(--safe-left) + 12px);
            padding-right: calc(var(--safe-right) + 12px);
            pointer-events: auto;
        }

        .nav-inner {
            display: flex;
            flex-direction: row;
            height: 44px;
            align-items: center;
            justify-content: space-between;
            position: relative;
            flex-shrink: 0;
            width: 100%;
        }

        .nav-btn {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            height: 44px;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 21px;
            flex-shrink: 0;
            width: 52px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.08);
        }

        .notification-dot {
            position: absolute;
            right: 0;
            width: 12px;
            height: 12px;
            top: 0;
            background: #609dff;
            border-radius: 50%;
        }

        .nav-title-container {
            flex: 1 0 0;
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .nav-title {
            display: flex;
            flex: 1 0 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nav-title-inner {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: row;
            gap: 2px;
            height: 36px;
            align-items: center;
            padding: 8px 10px 8px 14px;
            border-radius: 17px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.08);
        }

        .nav-title-text {
            font-weight: 700;
            font-size: 13px;
            opacity: 0.6;
            color: white;
            white-space: nowrap;
        }

        .ico-container {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .opacity-60 { opacity: 0.6; }
    </style>
</head>

</html>
