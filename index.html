<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <title>Neat Open Proto Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }

        html {
            background-color: #0B0A0B;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: url('img/wallpaper.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            /* Disabled extra height for debugging transparency */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Part 1: Nav - Scrolls away naturally */
        .nav-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            width: 100%;
            padding: 0 12px;
            margin-top: env(safe-area-inset-top, 12px);
            margin-bottom: 12px;
            z-index: 1001;
        }

        /* Streams - Static for now to debug transparency */
        .streams-section {
            position: relative;
            /* position: sticky; */
            /* top: env(safe-area-inset-top, 12px); */
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 0 12px 12px 12px;
            z-index: 1000;
        }

        /* Figma Components */
        .nav-btn {
            width: 52px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 21px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .notification-dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #609DFF;
            border-radius: 50%;
        }

        .brand-pill {
            height: 36px;
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 10px 0 14px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 17px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.08);
        }

        .brand-pill p {
            font-size: 13px;
            font-weight: 700;
            color: white;
            opacity: 0.6;
            margin: 0;
        }

        .arrow-ico {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnails-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .thumbnail {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Bottom Controls */
        .controls-area {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 20px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1002;
            display: flex;
            gap: 8px;
            align-items: center;
            width: max-content;
        }

        .controls-pill {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            display: flex;
            align-items: center;
            box-shadow: 0px 20px 32px rgba(0, 0, 0, 0.16);
        }

        .message-pill {
            width: 140px;
            height: 56px;
            justify-content: center;
            padding: 12px 24px;
        }

        .message-pill p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.68);
            font-weight: 400;
        }

        .basic-controls {
            padding: 8px;
            gap: 4px;
        }

        .control-btn {
            width: 60px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 19px;
        }

        .arrow-btn {
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            width: 54px;
            padding-left: 10px;
            border-radius: 0 19px 19px 0;
        }
    </style>
</head>

<body>
    <!-- Part 1: Nav - Elements that scroll out -->
    <div class="nav-section">
        <div class="nav-btn">
            <img src="img/user.svg" width="24" height="24" alt="User">
            <div class="notification-dot"></div>
        </div>
        <div class="brand-pill">
            <p>Brand design</p>
            <div class="arrow-ico">
                <img src="img/arrow.svg" width="16" height="16" alt="Arrow">
            </div>
        </div>
        <div class="nav-btn">
            <img src="img/info.svg" width="24" height="24" alt="Info">
        </div>
    </div>

    <!-- Part 2: Streams - Sticky Section -->
    <div class="streams-section">
        <div class="thumbnails-container">
            <div class="thumbnail" style="background-image: url('img/avatar1.png')"></div>
            <div class="thumbnail" style="background-image: url('img/avatar2.png')"></div>
            <div class="thumbnail" style="background-image: url('img/avatar3.png')"></div>
            <div class="thumbnail" style="background-image: url('img/avatar4.png')"></div>
            <div class="thumbnail" style="background-image: url('img/avatar5.png')"></div>
        </div>
    </div>

    <!-- Part 3: Bottom Controls Area -->
    <div class="controls-area">
        <div class="controls-pill message-pill">
            <p>Message...</p>
        </div>
        <div class="controls-pill basic-controls">
            <div class="control-btn">
                <img src="img/ai-notes.svg" width="28" height="28" alt="AI Notes">
            </div>
            <div class="control-btn">
                <img src="img/end-call.svg" width="28" height="28" alt="End Call">
            </div>
            <div class="control-btn arrow-btn">
                <img src="img/small-arrow.svg" width="18" height="18" alt="Toggle">
            </div>
        </div>
    </div>
</body>

</html>
