<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="color-scheme" content="dark light" />
    <title>Video Conference</title>

    <style>
        /* === RESET === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        /* === CSS CUSTOM PROPERTIES === */
        :root {
            --safe-top: 12px;
            --safe-bottom: 20px;
            --safe-left: 12px;
            --safe-right: 12px;
        }

        @supports (-webkit-touch-callout: none) {
            :root {
                --safe-top: env(safe-area-inset-top);
                --safe-bottom: env(safe-area-inset-bottom);
                --safe-left: calc(env(safe-area-inset-left) + 12px);
                --safe-right: calc(env(safe-area-inset-right) + 12px);
            }
        }

        html {
            font-size: 16px;
            background-color: #16141e;
        }

        body {
            background: transparent;
            padding: 0 !important;
            margin: 0 !important;
            font-family: 'Golos Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
        }

        #root {
            background-color: transparent !important;
            isolation: isolate;
            padding: 0 !important;
            margin: 0 !important;
            min-height: 100vh;
            width: 100%;
        }

        /* === UTILITY CLASSES (jak Tailwind) === */
        .content-stretch {
            display: flex;
            flex-direction: column;
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .flex-row {
            flex-direction: row;
        }

        .items-center {
            align-items: center;
        }

        .items-start {
            align-items: flex-start;
        }

        .items-end {
            align-items: flex-end;
        }

        .justify-center {
            justify-content: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .justify-end {
            justify-content: flex-end;
        }

        .justify-self-start {
            justify-self: start;
        }

        .relative {
            position: relative;
        }

        .absolute {
            position: absolute;
        }

        .fixed {
            position: fixed;
        }

        .inset-0 {
            inset: 0;
        }

        .shrink-0 {
            flex-shrink: 0;
        }

        .size-full {
            width: 100%;
            height: 100%;
        }

        .w-full {
            width: 100%;
        }

        .h-full {
            height: 100%;
        }

        .min-h-px {
            min-height: 1px;
        }

        .min-w-px {
            min-width: 1px;
        }

        .max-w-none {
            max-width: none;
        }

        .max-h-full {
            max-height: 100%;
        }

        .overflow-clip {
            overflow: clip;
        }

        .overflow-hidden {
            overflow: hidden;
        }

        .pointer-events-none {
            pointer-events: none;
        }

        .whitespace-nowrap {
            white-space: nowrap;
        }

        .text-center {
            text-align: center;
        }

        .text-ellipsis {
            text-overflow: ellipsis;
        }

        .object-cover {
            object-fit: cover;
        }

        .block {
            display: block;
        }

        .grid {
            display: grid;
        }

        .self-stretch {
            align-self: stretch;
        }

        /* === WALLPAPER === */
        .wallpaper {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: url('img/wallpaper.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* === MAIN VIDEO AREA === */
        .main-video-area {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            left: 0;
            right: 0;
            pointer-events: none;
            transition: all 0.3s ease-out;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        .main-video-area.ui-visible {
            top: calc(var(--safe-top) + 44px + 12px + 56px);
            bottom: calc(var(--safe-bottom) + 54px + 8px);
        }

        .main-video-area.ui-hidden {
            top: calc(var(--safe-top) + 56px);
            bottom: var(--safe-bottom);
        }

        .video-stream {
            aspect-ratio: 390 / 390;
            position: relative;
            flex-shrink: 0;
            width: 100%;
            max-height: 100%;
        }

        .video-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            inset: 0;
            align-items: center;
            justify-content: center;
        }

        .video-inner {
            flex: 1 0 0;
            min-height: 1px;
            min-width: 1px;
            overflow: clip;
            position: relative;
            border-radius: 24px;
            width: 100%;
        }

        .video-bg {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(119.358deg, rgb(122, 100, 66) 0%, rgb(125, 108, 70) 100%);
        }

        .video-img {
            position: absolute;
            aspect-ratio: 2880 / 1620;
            bottom: 0;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .video-img-content {
            position: absolute;
            inset: 0;
            max-width: none;
            object-fit: cover;
            pointer-events: none;
            width: 100%;
            height: 100%;
            /* Placeholder gradient */
            background: radial-gradient(ellipse at center, rgba(140, 120, 90, 0.3) 0%, transparent 70%);
        }

        .video-border {
            position: absolute;
            background: black;
            inset: 0;
            mix-blend-mode: screen;
            pointer-events: none;
            border-radius: 24px;
        }

        .video-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0px 0px 0px 3px rgba(0, 0, 0, 0.4);
        }

        .video-border::after {
            content: '';
            position: absolute;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            inset: 0;
            border-radius: 24px;
        }

        .video-overlays {
            position: absolute;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-rows: repeat(2, minmax(0, 1fr));
            inset: 12px;
            align-items: end;
        }

        .video-name {
            backdrop-filter: blur(30px);
            background: rgba(0, 0, 0, 0.4);
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: row;
            height: 24px;
            align-items: center;
            justify-self: start;
            padding-left: 8px;
            padding-right: 8px;
            position: relative;
            border-radius: 120px;
            flex-shrink: 0;
        }

        .video-name-text {
            display: flex;
            flex-direction: column;
            font-family: 'Golos Text', sans-serif;
            font-weight: 400;
            justify-content: center;
            line-height: 16px;
            position: relative;
            flex-shrink: 0;
            font-size: 11px;
            color: white;
            white-space: nowrap;
        }

        .video-name-text p {
            line-height: 16px;
            margin: 0;
        }

        /* === CONTROLS === */
        .controls {
            position: fixed;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            left: 0;
            right: 0;
            transition: transform 0.3s ease-out;
            padding-bottom: var(--safe-bottom);
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        .controls.ui-hidden {
            transform: translateY(100%);
        }

        .controls-inner {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            flex-shrink: 0;
        }

        .controls-mobile {
            display: flex;
            flex-direction: row;
            gap: 8px;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }

        .message-box {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            position: relative;
            border-radius: 27px;
            box-shadow: 0px 20px 32px 0px rgba(0, 0, 0, 0.16);
            flex-shrink: 0;
            width: 140px;
        }

        .message-box::before {
            content: '';
            position: absolute;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            inset: 0;
            pointer-events: none;
            border-radius: 27px;
        }

        .message-txt {
            display: flex;
            flex-direction: column;
            height: 32px;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            width: 92px;
        }

        .message-txt p {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1 0 0;
            font-family: 'Golos Text', sans-serif;
            font-weight: 400;
            line-height: 24px;
            min-height: 1px;
            min-width: 1px;
            position: relative;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.68);
            text-align: center;
            margin: 0;
        }

        .controls-buttons {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: row;
            gap: 4px;
            align-items: center;
            justify-content: center;
            padding: 8px;
            position: relative;
            border-radius: 27px;
            box-shadow: 0px 20px 32px 0px rgba(0, 0, 0, 0.16);
            flex-shrink: 0;
        }

        .controls-buttons::before {
            content: '';
            position: absolute;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            inset: 0;
            pointer-events: none;
            border-radius: 27px;
        }

        .control-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 16px;
            position: relative;
            border-radius: 19px;
            flex-shrink: 0;
            width: 60px;
        }

        .control-btn-arrow {
            display: flex;
            flex-direction: column;
            height: 40px;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 19px;
            flex-shrink: 0;
            width: 60px;
        }

        .control-arrow-inner {
            height: 100%;
            position: relative;
            flex-shrink: 0;
        }

        .control-arrow-inner::before {
            content: '';
            position: absolute;
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            inset: 0;
            pointer-events: none;
        }

        .control-arrow-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .control-arrow-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            align-items: center;
            padding-left: 18px;
            padding-top: 10px;
            padding-bottom: 10px;
            position: relative;
        }

        /* === NAV === */
        .nav {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            left: 0;
            right: 0;
            top: 0;
            transition: transform 0.3s ease-out;
            padding-top: var(--safe-top);
            padding-bottom: 12px;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        .nav.ui-hidden {
            transform: translateY(-100%);
        }

        .nav-inner {
            display: flex;
            flex-direction: row;
            height: 44px;
            align-items: center;
            justify-content: space-between;
            position: relative;
            flex-shrink: 0;
            width: 100%;
        }

        .nav-btn {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            height: 44px;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 21px;
            flex-shrink: 0;
            width: 52px;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            inset: 0;
            pointer-events: none;
            border-radius: 21px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.08);
        }

        .notification-dot {
            position: absolute;
            right: 0;
            width: 12px;
            height: 12px;
            top: 0;
        }

        .notification-dot-inner {
            position: absolute;
            background: #609dff;
            right: 0;
            border-radius: 64px;
            width: 12px;
            height: 12px;
            top: 0;
        }

        .nav-title-container {
            flex: 1 0 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            align-self: stretch;
        }

        .nav-title {
            display: flex;
            flex: 1 0 0;
            flex-direction: column;
            height: 100%;
            align-items: center;
            justify-content: center;
            min-height: 1px;
            min-width: 1px;
            overflow: clip;
            position: relative;
        }

        .nav-title-inner {
            backdrop-filter: blur(40px);
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: row;
            gap: 2px;
            height: 36px;
            align-items: center;
            padding-left: 14px;
            padding-right: 10px;
            padding-top: 8px;
            padding-bottom: 8px;
            position: relative;
            border-radius: 17px;
            flex-shrink: 0;
        }

        .nav-title-inner::before {
            content: '';
            position: absolute;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            inset: 0;
            pointer-events: none;
            border-radius: 17px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.08);
        }

        .nav-title-text {
            display: flex;
            flex-direction: column;
            font-family: 'Golos Text', sans-serif;
            font-weight: 700;
            justify-content: center;
            line-height: 0;
            opacity: 0.6;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            font-size: 13px;
            text-overflow: ellipsis;
            color: white;
            white-space: nowrap;
        }

        .nav-title-text p {
            line-height: 22px;
            overflow: hidden;
        }

        /* === THUMBNAILS === */
        .thumbnails {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            left: 0;
            right: 0;
            transition: all 0.3s ease-out;
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        .thumbnails.ui-visible {
            top: calc(var(--safe-top) + 44px + 12px);
        }

        .thumbnails.ui-hidden {
            top: var(--safe-top);
        }

        .thumbnails-streams {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            width: 100%;
        }

        .thumbnails-inner {
            display: flex;
            flex-direction: row;
            gap: 8px;
            align-items: flex-start;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .thumbnail {
            position: relative;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
        }

        /* === SVG STYLES === */
        svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ico-container {
            position: relative;
            flex-shrink: 0;
        }

        .opacity-60 {
            opacity: 0.6;
        }
    </style>
</head>

                    if (!ticking) {

                            const currentScrollY = window.scrollY;
                            const scrollDelta = currentScrollY - lastScrollY;

                            if (scrollDelta > 10) {
                                setIsUIHidden(true);
                            } else if (scrollDelta < -10) {
                                setIsUIHidden(false);
                            }

                            lastScrollY = currentScrollY;
                            ticking = false;
                        });
                        ticking = true;
                    }
                };

                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
