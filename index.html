<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Anti-Cache Measures -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="color-scheme" content="dark light">
    <title>Neat Open Proto Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }

        html {
            background-color: #261F26;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: url('img/wallpaper-great.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* Height is managed dynamically by mobile-safari.js */
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: min-height 0.2s ease;
        }

        /* ========== LAYOUT OVERLAY ========== */
        .layout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            pointer-events: none;
            /* Sacred 6px bottom gap for Safari transparency */
            margin-bottom: 6px;
            /* DEBUG */
            border: 2px solid rgba(255, 0, 0, 0.3);
        }

        /* Top Section: Nav + Streams */
        .top-section {
            flex-shrink: 0;
            padding-top: 0;
            overflow: hidden;
            pointer-events: auto;
            /* DEBUG */
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .nav-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            width: 100%;
            padding: 0 12px;
            opacity: var(--nav-opacity, 1);
            /* Slide up when fading — negative margin pulls it out of view */
            margin-top: calc((var(--nav-opacity, 1) - 1) * 56px);
            pointer-events: auto;
            /* DEBUG */
            border: 1px solid rgba(255, 255, 0, 0.3);
        }

        .streams-section {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 8px;
            padding: 0 12px;
            /* DEBUG */
            border: 1px solid rgba(0, 0, 255, 0.3);
        }

        /* Figma Components */
        .nav-btn {
            width: 52px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 21px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .notification-dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #609DFF;
            border-radius: 50%;
        }

        .brand-pill {
            height: 36px;
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 10px 0 14px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 17px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.08);
        }

        .brand-pill p {
            font-size: 13px;
            font-family: 'Golos Text', sans-serif;
            font-weight: 700;
            color: white;
            opacity: 0.6;
            margin: 0;
        }

        .arrow-ico {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnails-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .thumbnail {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Bottom Section: Controls wrapper */
        .bottom-section {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            padding-bottom: 0;
            pointer-events: auto;
            /* Animate controls height based on opacity */
            max-height: calc(var(--controls-opacity, 1) * 80px);
            overflow: hidden;
            transition: max-height 0.15s ease-out;
            /* DEBUG */
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        .controls-area {
            opacity: var(--controls-opacity, 1);
            display: flex;
            gap: 8px;
            align-items: center;
            width: max-content;
            /* Scale down toward bottom while fading */
            transform: scale(var(--controls-opacity, 1));
            transform-origin: bottom center;
        }

        .controls-pill {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            display: flex;
            align-items: center;
            /* box-shadow: 0px 20px 32px rgba(0, 0, 0, 0.16); */
        }

        .message-pill {
            width: 140px;
            height: 56px;
            justify-content: center;
            padding: 12px 24px;
        }

        .message-pill p {
            font-size: 15px;
            font-family: 'Golos Text', sans-serif;
            color: rgba(255, 255, 255, 0.68);
            font-weight: 400;
        }

        .basic-controls {
            padding: 8px;
            gap: 4px;
        }

        .control-btn {
            width: 60px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 19px;
        }

        .arrow-btn {
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            width: 54px;
            padding-left: 10px;
            border-radius: 0 19px 19px 0;
        }

        /* Main Video Area - Flex child, auto-fills gap */
        .main-video-area {
            flex: 1;
            min-height: 0;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* DEBUG */
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        /* 1:1 Square Video Content */
        .video-content-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 100%;
            max-height: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* Liquid Smoothing: The video settles smoothly while its parent frames instantly */
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-content-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-name-tag {
            position: absolute;
            bottom: 12px;
            left: 12px;
            height: 24px;
            padding: 0 8px;
            background: rgba(0, 0, 0, 0.40);
            border-radius: 120px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
        }

        .video-name-tag span {
            color: white;
            font-size: 11px;
            font-family: 'Golos Text', sans-serif;
            font-weight: 400;
            line-height: 16px;
        }
    </style>
</head>

<body>
    <!-- Layout Overlay: Fixed flex container for all visual layers -->
    <div class="layout-overlay">

        <!-- Top Section: Nav + Streams -->
        <div class="top-section">
            <div class="nav-section">
                <div class="nav-btn">
                    <img src="img/user.svg" width="24" height="24" alt="User">
                    <div class="notification-dot"></div>
                </div>
                <div class="brand-pill">
                    <p>Brand design</p>
                    <div class="arrow-ico">
                        <img src="img/arrow.svg" width="16" height="16" alt="Arrow">
                    </div>
                </div>
                <div class="nav-btn" id="info-btn">
                    <img src="img/info.svg" width="24" height="24" alt="Info">
                </div>
            </div>

            <div class="streams-section">
                <div class="thumbnails-container">
                    <div class="thumbnail" style="background-image: url('img/avatar5.png')"></div>
                    <div class="thumbnail" style="background-image: url('img/avatar4.png')"></div>
                    <div class="thumbnail" style="background-image: url('img/avatar3.png')"></div>
                    <div class="thumbnail" style="background-image: url('img/avatar2.png')"></div>
                    <div class="thumbnail" style="background-image: url('img/avatar1.png')"></div>
                </div>
            </div>
        </div>

        <!-- Main Video Area: flex:1, auto-fills the gap -->
        <div class="main-video-area" id="main-video-area">
            <div class="video-content-square">
                <img src="img/andrzej.jpg" alt="Main Video">
                <div class="video-name-tag">
                    <span>Andrzej</span>
                </div>
            </div>
        </div>

        <!-- Bottom Section: Controls with animated max-height -->
        <div class="bottom-section">
            <div class="controls-area">
                <div class="controls-pill message-pill">
                    <p>Message...</p>
                </div>
                <div class="controls-pill basic-controls">
                    <div class="control-btn">
                        <img src="img/ai-notes.svg" width="28" height="28" alt="AI Notes">
                    </div>
                    <div class="control-btn">
                        <img src="img/end-call.svg" width="28" height="28" alt="End Call">
                    </div>
                    <div class="control-btn arrow-btn">
                        <img src="img/small-arrow.svg" width="18" height="18" alt="Toggle">
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /layout-overlay -->

    <script src="mobile-safari.js?v=2026.03.21.1145"></script>
</body>

</html>
